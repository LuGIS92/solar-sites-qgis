name: Release

# Ausgelöst wenn ein Versions-Tag gepusht wird: git tag v2.0.1 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: ZIP bauen und GitHub Release erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Plugin-ZIP bauen
        run: bash scripts/build_zip.sh

      - name: Version aus Tag lesen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: CHANGELOG-Eintrag für diesen Tag extrahieren
        id: changelog
        run: |
          python - <<'EOF'
          import re, sys
          tag = "${{ steps.version.outputs.VERSION }}"
          version = tag.lstrip("v")
          try:
              text = open("CHANGELOG.md").read()
              # Findet den Block zwischen dieser Version und der nächsten
              pattern = rf"## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\Z)"
              m = re.search(pattern, text, re.DOTALL)
              body = m.group(1).strip() if m else "_Keine CHANGELOG-Einträge gefunden._"
          except Exception as e:
              body = f"_Fehler beim Lesen des CHANGELOG: {e}_"
          with open("release_notes.md", "w") as f:
              f.write(body)
          print(body[:500])
          EOF

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "Solar Sites PV Plugin ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          files: dist/solar_sites_pv_analysis_*.zip
          draft: false
          prerelease: false
