name: CI

on:
  push:
    branches: ["main", "claude/**"]
    tags: ["v*.*.*"]       # Tests laufen auch beim Release-Tag
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install ruff pytest pytest-cov pydantic-settings requests pandas openpyxl

      - name: Lint (ruff)
        run: ruff check solar_sites/ qgis_solar_plugin/

      - name: Syntax-Check Plugin-Dateien
        run: python -m compileall -q qgis_solar_plugin/ solar_sites/

      - name: Tests mit Coverage
        run: |
          pytest tests/ --ignore=tests/qgis/ -v --tb=short \
            --cov=solar_sites --cov=qgis_solar_plugin \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Coverage-Zusammenfassung in Job-Übersicht
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse("coverage.xml")
              cov = float(tree.getroot().attrib.get("line-rate", 0)) * 100
              print(f"### Coverage: {cov:.1f} %")
              if cov < 50:
                  print("⚠ Coverage unter 50 % – bitte Tests ergänzen.")
          except Exception as e:
              print(f"Coverage-Report konnte nicht gelesen werden: {e}")
          EOF

  # ---------------------------------------------------------------------------
  # QGIS-Integration-Tests (echter QGIS-Layer, Renderer, GeoPackage-Export)
  # ---------------------------------------------------------------------------
  test-qgis:
    name: QGIS ${{ matrix.label }} Integration
    runs-on: ubuntu-latest
    # QGIS 4 / Qt6 gilt als "experimental" – Fehler brechen den Gesamt-Build nicht
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "3 LTR"
            image: qgis/qgis:ltr
            experimental: false
          - label: "4 (Qt6)"
            image: qgis/qgis:latest
            experimental: true
    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@v6

      - name: pytest-qgis installieren
        # --break-system-packages nötig in neueren Debian-Images (PEP 668)
        # Im wegwerfbaren Docker-Container unkritisch
        run: pip3 install --break-system-packages pytest pytest-qgis

      - name: QGIS-Integration-Tests
        run: |
          xvfb-run -s "+extension GLX -screen 0 1024x768x24" \
            pytest tests/qgis/ -v --tb=short
